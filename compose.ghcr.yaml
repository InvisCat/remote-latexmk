# Use with compose.yaml to pull a tagged release instead of building locally.
services:
  server:
    image: ${LATEXMK_GHCR_SERVER_IMAGE:-ghcr.io/${LATEXMK_GHCR_NAMESPACE:-billstark001}/latexmk-server:${LATEXMK_GHCR_VERSION:?Set LATEXMK_GHCR_VERSION in .env}}
    pull_policy: always

  client:
    image: ${LATEXMK_GHCR_CLIENT_IMAGE:-ghcr.io/${LATEXMK_GHCR_NAMESPACE:-billstark001}/latexmk-client:${LATEXMK_GHCR_VERSION:?Set LATEXMK_GHCR_VERSION in .env}}
    pull_policy: always

  client-watch:
    image: ${LATEXMK_GHCR_CLIENT_IMAGE:-ghcr.io/${LATEXMK_GHCR_NAMESPACE:-billstark001}/latexmk-client:${LATEXMK_GHCR_VERSION:?Set LATEXMK_GHCR_VERSION in .env}}
    pull_policy: always
