        <path d="M14 9 H24 M15.5 11 L18 17 M24.5 11 L20 17" fill="none" stroke="#8ff0c8" stroke-width="1.3" stroke-linecap="round"/>
        <circle cx="12" cy="9" r="2.5" fill="#8ff0c8"/>
