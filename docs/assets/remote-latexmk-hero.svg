<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">remote-latexmk</title>
  <desc id="desc">A CLI client or a local coding agent with an MCP interface sends source files to a private TeX server and receives PDFs and diagnostics.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0d1b2e"/>
      <stop offset="1" stop-color="#14243a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#64d8ff"/>
      <stop offset="1" stop-color="#8ff0c8"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#02060d" flood-opacity="0.46"/>
    </filter>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#9bb8d5" opacity="0.12"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" rx="28" fill="url(#background)"/>
  <rect width="1280" height="640" rx="28" fill="url(#dots)"/>
  <circle cx="1060" cy="62" r="220" fill="#1a6f8f" opacity="0.12"/>
  <circle cx="1194" cy="545" r="250" fill="#2c8a6b" opacity="0.10"/>

