name: latexmk

services:
  server:
    build:
      context: .
      dockerfile: packages/deploy/templates/Dockerfile.slim
      args:
        SERVER_SOURCE: packages/server
        DEPLOY_ASSETS: packages/deploy/templates
        GO_IMAGE: ${GO_IMAGE:-golang:1.26.5-bookworm}
        TEXLIVE_IMAGE: ${TEXLIVE_IMAGE:-texlive/texlive:latest-basic}
        VERSION: ${LATEXMK_VERSION:-0.1.0-local}
        COMMIT: ${LATEXMK_COMMIT:-local}
        BUILD_DATE: ${LATEXMK_BUILD_DATE:-unknown}
    image: ${LATEXMK_SERVER_IMAGE:-latexmk-server:local}
    restart: unless-stopped
    environment:
      PORT: "8080"
      LATEXMK_IMAGE_PROFILE: xelatex-cjk-slim
      LATEXMK_AUTH_MODE: token
      LATEXMK_API_TOKEN: ${LATEXMK_API_TOKEN:?Set LATEXMK_API_TOKEN in .env}
      LATEXMK_DATABASE_MODE: postgres
      LATEXMK_ENGINES: ${LATEXMK_ENGINES:-xelatex,pdflatex}
      LATEXMK_ALLOW_SHELL_ESCAPE: "false"
      LATEXMK_COMPILE_TIMEOUT: ${LATEXMK_COMPILE_TIMEOUT:-5m}
      LATEXMK_MAX_CONCURRENT_COMPILES: ${LATEXMK_MAX_CONCURRENT_COMPILES:-1}
      LATEXMK_MAX_QUEUED_JOBS: ${LATEXMK_MAX_QUEUED_JOBS:-12}
      LATEXMK_MAX_UPLOAD_BYTES: ${LATEXMK_MAX_UPLOAD_BYTES:-64MiB}
      LATEXMK_MAX_EXPANDED_BYTES: ${LATEXMK_MAX_EXPANDED_BYTES:-256MiB}
      LATEXMK_MAX_ARTIFACT_BYTES: ${LATEXMK_MAX_ARTIFACT_BYTES:-96MiB}
      LATEXMK_MAX_FILES: ${LATEXMK_MAX_FILES:-5000}
      LATEXMK_MAX_LOG_BYTES: ${LATEXMK_MAX_LOG_BYTES:-4MiB}
      LATEXMK_MAX_STATE_BYTES: ${LATEXMK_MAX_STATE_BYTES:-3GiB}
      LATEXMK_MAX_UPLOAD_SESSIONS: ${LATEXMK_MAX_UPLOAD_SESSIONS:-64}
      LATEXMK_RESULT_RETENTION: ${LATEXMK_RESULT_RETENTION:-168h}
      LATEXMK_SNAPSHOT_RETENTION: ${LATEXMK_SNAPSHOT_RETENTION:-168h}
      LATEXMK_BLOB_RETENTION: ${LATEXMK_BLOB_RETENTION:-168h}
      LATEXMK_STATE_SWEEP_INTERVAL: ${LATEXMK_STATE_SWEEP_INTERVAL:-1h}
      LATEXMK_STATE_DIR: /var/lib/latexmk
      LATEXMK_TEMP_DIR: /tmp
      LATEXMK_CORS_ORIGINS: ${LATEXMK_CORS_ORIGINS:-}
    ports:
      - "${LATEXMK_BIND_ADDRESS:-127.0.0.1}:${LATEXMK_HOST_PORT:-8080}:8080"
    read_only: true
    mem_limit: ${LATEXMK_MEMORY_LIMIT:-2g}
    pids_limit: ${LATEXMK_PIDS_LIMIT:-192}
    tmpfs:
      - /tmp:size=${LATEXMK_TMPFS_SIZE:-768m},mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - latexmk-state:/var/lib/latexmk

  client:
    profiles:
      - client
    build:
      context: .
      dockerfile: packages/cli/Dockerfile
      args:
        GO_IMAGE: ${GO_IMAGE:-golang:1.26.5-bookworm}
        CLIENT_BASE_IMAGE: ${LATEXMK_CLIENT_BASE_IMAGE:-debian:bookworm-slim}
        VERSION: ${LATEXMK_VERSION:-0.1.0-local}
        COMMIT: ${LATEXMK_COMMIT:-local}
        BUILD_DATE: ${LATEXMK_BUILD_DATE:-unknown}
    image: ${LATEXMK_CLIENT_IMAGE:-latexmk-client:local}
    user: "${LATEXMK_CLIENT_UID:-1000}:${LATEXMK_CLIENT_GID:-1000}"
    environment:
      LATEXMK_SERVER: ${LATEXMK_CLIENT_SERVER:-http://server:8080}
      LATEXMK_TOKEN: ${LATEXMK_CLIENT_TOKEN:-${LATEXMK_API_TOKEN}}
      LATEXMK_CA_FILE: ${LATEXMK_CLIENT_CA_FILE:-}
      LATEXMK_UPLOAD_MODE: ${LATEXMK_CLIENT_UPLOAD_MODE:-auto}
    working_dir: /workspace
    volumes:
      - type: bind
        source: ${LATEXMK_PROJECT_DIR:-./examples/basic}
        target: /workspace
      - type: bind
        source: ./certs
        target: /etc/latexmk/certs
        read_only: true
    depends_on:
      server:
        condition: service_started

  proxy:
    profiles:
      - https
    image: ${CADDY_IMAGE:-caddy:2-alpine}
    restart: unless-stopped
    environment:
      LATEXMK_TLS_HOST: ${LATEXMK_TLS_HOST:-localhost}
    ports:
      - "${LATEXMK_HTTPS_BIND_ADDRESS:-127.0.0.1}:${LATEXMK_HTTPS_PORT:-8443}:8443"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - ./packages/deploy/templates/Caddyfile.compose:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      default:
        aliases:
          - latexmk.local
    depends_on:
      server:
        condition: service_started

volumes:
  latexmk-state:
  caddy-data:
  caddy-config:
