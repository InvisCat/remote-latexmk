name: release recovery

run-name: recover ${{ inputs.tag }} from run ${{ inputs.run_id }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to recover
        required: true
        type: string
      run_id:
        description: Failed release workflow run ID
        required: true
        type: string

concurrency:
  group: release-recovery-${{ inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  recover:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      attestations: write
      id-token: write
    env:
      RELEASE_TAG: ${{ inputs.tag }}
      SOURCE_RUN_ID: ${{ inputs.run_id }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Validate recovery inputs
        shell: bash
        run: |
          set -euo pipefail
          [[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]
          [[ "${SOURCE_RUN_ID}" =~ ^[0-9]+$ ]]
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
      - name: Match the source run to the tag
        shell: bash
        run: |
          set -euo pipefail
          tag_sha="$(git rev-parse "${RELEASE_TAG}^{commit}")"
          run_json="$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${SOURCE_RUN_ID}")"
          test "$(jq -r '.head_sha' <<< "${run_json}")" = "${tag_sha}"
          test "$(jq -r '.path' <<< "${run_json}")" = ".github/workflows/release.yml"
          test "$(jq -r '.event' <<< "${run_json}")" = "push"
          test "$(jq -r '.status' <<< "${run_json}")" = "completed"
          test "$(jq -r '.conclusion' <<< "${run_json}")" = "failure"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: client-*
          path: dist
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.run_id }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: server-*
          path: dist
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.run_id }}
      - name: Add installer and checksums
        shell: bash
        run: |
          set -euo pipefail
          cp scripts/install-server.sh dist/install-server.sh
          cd dist
          find . -maxdepth 1 -type f \( -name 'latexmk_*' -o -name 'remote-latexmk-server_*' -o -name 'install-server.sh' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sed 's#  \./#  #' > SHA256SUMS
          test "$(wc -l < SHA256SUMS)" -eq 9
      - uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/*
      - name: Create or repair GitHub release
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/* --clobber
          else
            release_args=(
              --verify-tag
              --generate-notes
              --title "remote-latexmk ${version}"
            )
            if [[ "${RELEASE_TAG}" == *-* ]]; then
              release_args+=(--prerelease)
            fi
            gh release create "${RELEASE_TAG}" dist/* "${release_args[@]}"
          fi
