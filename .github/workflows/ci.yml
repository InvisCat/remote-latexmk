name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.5'
          cache-dependency-path: |
            packages/cli/go.mod
            packages/server/go.mod
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.13.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: pnpm
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      - name: Verify standalone Go modules
        run: |
          (cd packages/cli && GOWORK=off go mod tidy)
          (cd packages/server && GOWORK=off go mod tidy)
          git diff --exit-code -- packages/cli/go.mod packages/cli/go.sum packages/server/go.mod packages/server/go.sum
      - name: Build client container
        run: docker buildx build --platform linux/amd64,linux/arm64 --file packages/cli/Dockerfile --output type=cacheonly .
      - run: go vet ./packages/cli/... ./packages/server/...
      - name: Run Go race tests
        run: go test -race ./packages/cli/... ./packages/server/...
      - name: Check Go vulnerabilities
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          (cd packages/cli && govulncheck ./...)
          (cd packages/server && govulncheck ./...)
