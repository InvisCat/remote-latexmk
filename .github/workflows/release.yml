name: release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      build-date: ${{ steps.release.outputs.build-date }}
      owner: ${{ steps.release.outputs.owner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - id: release
        name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "release tags must look like v1.2.3 or v1.2.3-rc.1" >&2
            exit 2
          fi
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "version=${tag#v}" >> "${GITHUB_OUTPUT}"
          echo "build-date=$(git show -s --format=%cI HEAD)" >> "${GITHUB_OUTPUT}"
          echo "owner=${owner}" >> "${GITHUB_OUTPUT}"

  binaries:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.5'
          cache-dependency-path: packages/cli/go.mod
      - name: Build deterministic client archive
        working-directory: packages/cli
        run: |
          go run ./cmd/release-builder \
            --version '${{ needs.validate.outputs.version }}' \
            --goos '${{ matrix.target.goos }}' \
            --goarch '${{ matrix.target.goarch }}' \
            --commit '${{ github.sha }}' \
            --build-date '${{ needs.validate.outputs.build-date }}' \
            --repo-root ../.. \
            --out-dir ../../dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: client-${{ matrix.target.goos }}-${{ matrix.target.goarch }}
          path: dist/latexmk_*
          if-no-files-found: error
          retention-days: 14

  images:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server
            image: remote-latexmk-server
            file: packages/deploy/templates/Dockerfile.slim
            platforms: linux/amd64
            extra_build_args: |
              SERVER_SOURCE=packages/server
              DEPLOY_ASSETS=packages/deploy/templates
              GO_IMAGE=golang:1.26.5-bookworm@sha256:1ecb7edf62a0408027bd5729dfd6b1b8766e578e8df93995b225dfd0944eb651
              TEXLIVE_IMAGE=texlive/texlive:latest-basic@sha256:eaf1c8098d8600f89a63c2c8b30364bdef2dedffe9ea93065fa8e6f4edcea52b
          - name: server-full
            image: remote-latexmk-server-full
            file: packages/deploy/templates/Dockerfile.full
            platforms: linux/amd64
            extra_build_args: |
              SERVER_SOURCE=packages/server
              DEPLOY_ASSETS=packages/deploy/templates
              GO_IMAGE=golang:1.26.5-bookworm@sha256:1ecb7edf62a0408027bd5729dfd6b1b8766e578e8df93995b225dfd0944eb651
              TEXLIVE_IMAGE=texlive/texlive:latest@sha256:d39efa547acfa518072600315280f92357ca8e0b9e295e09b6ccd5f5d82a1373
          - name: client
            image: remote-latexmk-client
            file: packages/cli/Dockerfile
            platforms: linux/amd64,linux/arm64
            extra_build_args: |
              GO_IMAGE=golang:1.26.5-bookworm@sha256:1ecb7edf62a0408027bd5729dfd6b1b8766e578e8df93995b225dfd0944eb651
              CLIENT_BASE_IMAGE=debian:bookworm-slim@sha256:7b140f374b289a7c2befc338f42ebe6441b7ea838a042bbd5acbfca6ec875818
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ needs.validate.outputs.owner }}/${{ matrix.image }}
          flavor: latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
          labels: |
            org.opencontainers.image.title=remote-latexmk ${{ matrix.name }}
            org.opencontainers.image.description=Self-hosted remote LaTeX compiler ${{ matrix.name }} image
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.validate.outputs.version }}
      - id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: ${{ matrix.platforms }}
          pull: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.validate.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ needs.validate.outputs.build-date }}
            ${{ matrix.extra_build_args }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          provenance: mode=max
          sbom: true
      - uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ghcr.io/${{ needs.validate.outputs.owner }}/${{ matrix.image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  smoke-papers:
    needs: [validate, images]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compile executable slim and IEEE examples
        env:
          SMOKE_SLIM_SERVER_IMAGE: ghcr.io/${{ needs.validate.outputs.owner }}/remote-latexmk-server:${{ needs.validate.outputs.version }}
          SMOKE_FULL_SERVER_IMAGE: ghcr.io/${{ needs.validate.outputs.owner }}/remote-latexmk-server-full:${{ needs.validate.outputs.version }}
          SMOKE_CLIENT_IMAGE: ghcr.io/${{ needs.validate.outputs.owner }}/remote-latexmk-client:${{ needs.validate.outputs.version }}
        run: make smoke-papers

  release:
    needs: [validate, binaries, images, smoke-papers]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: client-*
          path: dist
          merge-multiple: true
      - name: Generate SHA-256 checksums
        run: |
          set -euo pipefail
          cd dist
          find . -maxdepth 1 -type f -name 'latexmk_*' -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sed 's#  \./#  #' > SHA256SUMS
          test "$(wc -l < SHA256SUMS)" -eq 6
      - uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/*
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
          else
            release_args=(
              --verify-tag
              --generate-notes
              --title "remote-latexmk ${{ needs.validate.outputs.version }}"
            )
            if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
              release_args+=(--prerelease)
            fi
            gh release create "${GITHUB_REF_NAME}" dist/* "${release_args[@]}"
          fi
